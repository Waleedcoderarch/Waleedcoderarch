name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ──────────────────────────────────────────────
      # 1. BASE METRICS (header, stats, community info)
      # ──────────────────────────────────────────────
      - name: Base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.base.svg
          user: Waleedcoderarch
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi

      # ──────────────────────────────────────────────
      # 2. CONTRIBUTIONS CALENDAR (isometric 3D view)
      # ──────────────────────────────────────────────
      - name: Isometric contributions calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.isocalendar.svg
          user: Waleedcoderarch
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ──────────────────────────────────────────────
      # 3. LANGUAGE ACTIVITY
      # ──────────────────────────────────────────────
      - name: Language activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.languages.svg
          user: Waleedcoderarch
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      # ──────────────────────────────────────────────
      # 4. COMMIT ACTIVITY (heatmap by hour + day)
      # ──────────────────────────────────────────────
      - name: Commit activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.activity.svg
          user: Waleedcoderarch
          base: ""
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_charts: yes
          plugin_habits_trim: yes

      # ──────────────────────────────────────────────
      # 5. MASTERED TECHNOLOGIES / TOPICS
      # ──────────────────────────────────────────────
      - name: Mastered technologies and topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.topics.svg
          user: Waleedcoderarch
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: mastered
          plugin_topics_sort: stars

      # ──────────────────────────────────────────────
      # 6. PAGESPEED INSIGHTS
      # Uncomment this block and replace the URL once you have a website
      # Also add PAGESPEED_TOKEN to your repo secrets (get free key at
      # https://developers.google.com/speed/docs/insights/v5/get-started)
      # ──────────────────────────────────────────────
      # - name: PageSpeed Insights
      #   uses: lowlighter/metrics@latest
      #   with:
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     filename: metrics.pagespeed.svg
      #     user: Waleedcoderarch
      #     base: ""
      #     plugin_pagespeed: yes
      #     plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
      #     plugin_pagespeed_url: https://your-website.com
      #     plugin_pagespeed_detailed: yes
      #     plugin_pagespeed_screenshot: yes
